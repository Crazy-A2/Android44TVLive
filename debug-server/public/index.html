<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Live Debug Server</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #1a1a2e; color: #eee; }
.header { background: #16213e; padding: 12px 20px; border-bottom: 1px solid #0f3460; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 18px; color: #e94560; }
.header .status { font-size: 13px; color: #aaa; }
.container { display: flex; height: calc(100vh - 49px); }
.sidebar { width: 280px; background: #16213e; border-right: 1px solid #0f3460; overflow-y: auto; }
.sidebar h2 { font-size: 14px; padding: 10px 15px; color: #e94560; border-bottom: 1px solid #0f3460; }
.device-item, .session-item { padding: 8px 15px; border-bottom: 1px solid #0f3460; cursor: pointer; font-size: 13px; }
.device-item:hover, .session-item:hover { background: #1a1a3e; }
.device-item.active, .session-item.active { background: #0f3460; }
.device-item .name { color: #4ecca3; font-weight: bold; }
.device-item .detail, .session-item .detail { color: #888; font-size: 12px; margin-top: 2px; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.status-bar { padding: 10px 20px; background: #16213e; border-bottom: 1px solid #0f3460; font-size: 13px; display: flex; gap: 20px; align-items: center; }
.status-bar .label { color: #888; }
.status-bar .value { color: #4ecca3; }
.log-area { flex: 1; overflow-y: auto; padding: 10px 20px; font-family: "Consolas", monospace; font-size: 13px; }
.log-entry { padding: 3px 0; border-bottom: 1px solid #1a1a3e; }
.log-entry .ts { color: #666; margin-right: 8px; }
.log-entry.ERROR { color: #e94560; }
.log-entry.WARN { color: #f0a500; }
.log-entry.INFO { color: #4ecca3; }
.log-entry .tag { color: #aaa; margin-left: 8px; }
.command-bar { padding: 10px 20px; background: #16213e; border-top: 1px solid #0f3460; display: flex; gap: 8px; align-items: center; }
.command-bar select, .command-bar button { padding: 6px 12px; font-size: 13px; border: 1px solid #0f3460; border-radius: 4px; background: #1a1a2e; color: #eee; }
.command-bar button { background: #e94560; border-color: #e94560; cursor: pointer; }
.command-bar button:hover { background: #c73652; }
.command-bar button:disabled { opacity: 0.4; cursor: default; }
.empty { display: flex; align-items: center; justify-content: center; height: 100%; color: #555; font-size: 15px; }
</style>
</head>
<body>
<div class="header">
  <h1>TV Live Debug Server</h1>
  <div class="status" id="serverStatus">连接中...</div>
</div>
<div class="container">
  <div class="sidebar">
    <h2>在线设备</h2>
    <div id="deviceList"></div>
    <h2>历史会话</h2>
    <div id="sessionList"></div>
  </div>
  <div class="main" id="mainArea">
    <div class="empty">选择设备或会话查看详情</div>
  </div>
</div>

<script>
const REFRESH_INTERVAL = 3000;
let selectedDevice = null;
let selectedSession = null;

async function api(path, opts) {
  try {
    const res = await fetch(path, opts);
    return await res.json();
  } catch (e) {
    console.error('API 请求失败:', e);
    return null;
  }
}

function formatTime(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  return d.toLocaleTimeString('zh-CN', { hour12: false });
}

function formatDate(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  return d.toLocaleDateString('zh-CN') + ' ' + d.toLocaleTimeString('zh-CN', { hour12: false });
}

async function refreshDevices() {
  const devices = await api('/api/devices');
  const el = document.getElementById('deviceList');
  if (!devices || devices.length === 0) {
    el.innerHTML = '<div class="device-item"><div class="detail">暂无在线设备</div></div>';
    return;
  }
  el.innerHTML = devices.map(d => `
    <div class="device-item ${selectedDevice === d.deviceId ? 'active' : ''}" onclick="selectDevice('${d.deviceId}')">
      <div class="name">${d.deviceId}</div>
      <div class="detail">${d.currentChannel || '-'} | ${d.playbackState || '-'} | ${formatTime(d.lastSeen)}</div>
    </div>
  `).join('');
  document.getElementById('serverStatus').textContent = `${devices.length} 台设备在线`;
}

async function refreshSessions() {
  const sessions = await api('/api/sessions');
  const el = document.getElementById('sessionList');
  if (!sessions || sessions.length === 0) {
    el.innerHTML = '<div class="session-item"><div class="detail">暂无会话</div></div>';
    return;
  }
  el.innerHTML = sessions.map(s => `
    <div class="session-item ${selectedSession === s.sessionId ? 'active' : ''}" onclick="selectSession('${s.sessionId}')">
      <div class="name">${s.sessionId}</div>
      <div class="detail">${s.logCount} 条日志 | ${formatTime(s.lastHeartbeat)}</div>
    </div>
  `).join('');
}

function selectDevice(deviceId) {
  selectedDevice = deviceId;
  selectedSession = null;
  showDeviceView(deviceId);
  refreshDevices();
  refreshSessions();
}

function selectSession(sessionId) {
  selectedSession = sessionId;
  selectedDevice = null;
  showSessionView(sessionId);
  refreshDevices();
  refreshSessions();
}

async function showDeviceView(deviceId) {
  const devices = await api('/api/devices');
  const device = devices.find(d => d.deviceId === deviceId);
  if (!device) return;

  // 获取该设备会话的日志
  let logs = [];
  if (device.sessionId) {
    logs = await api(`/api/logs?sessionId=${device.sessionId}&limit=50`) || [];
  }

  const main = document.getElementById('mainArea');
  main.innerHTML = `
    <div class="status-bar">
      <span><span class="label">设备:</span> <span class="value">${device.deviceId}</span></span>
      <span><span class="label">频道:</span> <span class="value">${device.currentChannel || '-'}</span></span>
      <span><span class="label">状态:</span> <span class="value">${device.playbackState || '-'}</span></span>
      <span><span class="label">解码:</span> <span class="value">${device.decoderMode || '-'}</span></span>
      <span><span class="label">内存:</span> <span class="value">${device.memoryUsedMB || '-'} MB</span></span>
      <span><span class="label">网络:</span> <span class="value">${device.networkType || '-'}</span></span>
    </div>
    <div class="log-area" id="logArea">
      ${logs.reverse().map(l => renderLogEntry(l)).join('')}
      ${logs.length === 0 ? '<div class="empty">暂无日志</div>' : ''}
    </div>
    <div class="command-bar">
      <select id="cmdType">
        <option value="RELOAD_SOURCES">重新加载源</option>
        <option value="SWITCH_CHANNEL">切换频道</option>
        <option value="SWITCH_DECODER">切换解码模式</option>
        <option value="GET_LOGCAT">抓取 logcat</option>
        <option value="RESTART_APP">重启 App</option>
      </select>
      <input id="cmdParam" placeholder="参数 (JSON)" style="flex:1;padding:6px;font-size:13px;background:#1a1a2e;color:#eee;border:1px solid #0f3460;border-radius:4px;">
      <button onclick="sendCommand()">发送命令</button>
    </div>
  `;
}

async function showSessionView(sessionId) {
  const session = await api(`/api/logs?sessionId=${sessionId}&limit=200`);
  const main = document.getElementById('mainArea');
  main.innerHTML = `
    <div class="status-bar">
      <span><span class="label">会话:</span> <span class="value">${sessionId}</span></span>
    </div>
    <div class="log-area">
      ${(session || []).reverse().map(l => renderLogEntry(l)).join('')}
      ${(!session || session.length === 0) ? '<div class="empty">暂无日志</div>' : ''}
    </div>
  `;
}

function renderLogEntry(l) {
  return `<div class="log-entry ${l.level}"><span class="ts">${formatTime(l.timestamp)}</span>[${l.level}]${l.tag ? '<span class="tag">' + l.tag + '</span>' : ''} ${escapeHtml(l.message)}</div>`;
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

async function sendCommand() {
  if (!selectedDevice) return;
  const type = document.getElementById('cmdType').value;
  let params = {};
  const paramStr = document.getElementById('cmdParam').value.trim();
  if (paramStr) {
    try { params = JSON.parse(paramStr); } catch (e) { alert('参数格式错误，请输入 JSON'); return; }
  }
  await api('/api/command', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ deviceId: selectedDevice, type, params })
  });
  alert('命令已发送');
}

async function refresh() {
  await refreshDevices();
  await refreshSessions();
  if (selectedDevice) showDeviceView(selectedDevice);
  else if (selectedSession) showSessionView(selectedSession);
}

refresh();
setInterval(refresh, REFRESH_INTERVAL);
</script>
</body>
</html>
